name: Deploy Malladog

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-malladog.yml"

jobs:
  deploy:
    runs-on: [self-hosted, vta]
    steps:
      - name: Checkout Malladog
        uses: actions/checkout@v4
        with:
          repository: mallanet/Malladog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write production env
        env:
          DISCORD_TOKEN: ${{ secrets.MALLADOG_DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.MALLADOG_DISCORD_GUILD_ID }}
          MISTRAL_API_KEY: ${{ secrets.MALLADOG_MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ secrets.MALLADOG_MISTRAL_MODEL }}
          LLM_PROVIDER: ${{ secrets.MALLADOG_LLM_PROVIDER }}
          CURSOR_API_KEY: ${{ secrets.MALLADOG_CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ secrets.MALLADOG_CURSOR_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.MALLADOG_OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.MALLADOG_OPENROUTER_MODEL }}
          BOT_PREFIX: ${{ secrets.MALLADOG_BOT_PREFIX }}
          STAFF_ROLE_IDS: ${{ secrets.MALLADOG_STAFF_ROLE_IDS }}
          REPLY_ALL: ${{ secrets.MALLADOG_REPLY_ALL }}
        run: |
          export MISTRAL_MODEL="${MISTRAL_MODEL:-mistral-medium-latest}"
          export LLM_PROVIDER="${LLM_PROVIDER:-cursor}"
          export CURSOR_MODEL="${CURSOR_MODEL:-auto}"
          export OPENROUTER_MODEL="${OPENROUTER_MODEL:-tencent/hy3:free}"
          export REPLY_ALL="${REPLY_ALL:-0}"
          chmod +x scripts/vps-*.sh
          bash scripts/vps-deploy.sh

      - name: Verify service
        run: |
          systemctl is-active malladog-bot
          systemctl is-enabled malladog-bot
