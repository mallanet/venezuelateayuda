name: Ops — Backfill zone coords

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: [self-hosted, vta]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Backfill profile/listing coords
        run: |
          set -euo pipefail
          export ENV_FILE=/opt/venezuelateayuda/.env.prod
          test -f "$ENV_FILE"
          # Script + libs are baked into the migrate image (Dockerfile migrate stage).
          docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" build migrate
          docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" run --rm \
            migrate npx tsx scripts/backfill-zone-coords.ts
