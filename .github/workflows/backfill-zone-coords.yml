name: Ops — Backfill zone coords

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: [self-hosted, vta]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Backfill profile/listing coords
        run: |
          set -euo pipefail
          export ENV_FILE=/opt/venezuelateayuda/.env.prod
          test -f "$ENV_FILE"
          docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" run --rm \
            -v "$PWD/scripts:/app/scripts:ro" \
            -v "$PWD/src/lib:/app/src/lib:ro" \
            migrate npx tsx scripts/backfill-zone-coords.ts
