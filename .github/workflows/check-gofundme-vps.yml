name: Ops — Check GoFundMe on VPS

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: [self-hosted, vta]
    timeout-minutes: 10
    steps:
      - name: Inspect running apps
        run: |
          set -euo pipefail
          echo "== containers =="
          docker ps --format '{{.Names}} {{.Status}}' | grep -E 'venezuelateayuda|terremoto' || true
          echo "== VTA app HTML =="
          docker exec venezuelateayuda-app-1 wget -qO- http://127.0.0.1:3000/ \
            | grep -oE 'gfm-embed|gfm-embed-iframe|support-mallanet|Donar en GoFundMe' | sort | uniq -c || true
          echo "== Terremoto frontend HTML =="
          docker exec terremotoapp-frontend-1 wget -qO- http://127.0.0.1:3000/ \
            | grep -oE 'gfm-embed|gfm-embed-iframe|support-mallanet|Donar en GoFundMe' | sort | uniq -c || true
          echo "== public edge =="
          curl -sL https://venezuelateayuda.org/ | grep -oE 'gfm-embed|Donar en GoFundMe|support-mallanet' | sort | uniq -c
          curl -sL https://terremotovenezuela.app/ | grep -oE 'gfm-embed|Donar en GoFundMe|support-mallanet' | sort | uniq -c
