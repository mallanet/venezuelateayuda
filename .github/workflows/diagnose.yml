name: Ops — Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: [self-hosted, vta]
    timeout-minutes: 10
    steps:
      - name: VPS diagnostics
        run: |
          echo "=== APP LOGS ==="
          docker logs venezuelateayuda-app-1 --tail 80 2>&1 || true
          echo "=== DB ==="
          docker exec venezuelateayuda-db-1 psql -U vta -d venezuelateayuda -c "SELECT COUNT(*) FROM \"HelpListing\";" 2>&1 || true
          docker exec venezuelateayuda-db-1 psql -U vta -d venezuelateayuda -c "SELECT status, COUNT(*) FROM \"HelpListing\" GROUP BY status;" 2>&1 || true
          echo "=== API LOCAL ==="
          curl -sv http://venezuelateayuda-app-1:3000/api/listings 2>&1 | tail -20 || true
          echo "=== PUBLIC FILES ==="
          docker exec venezuelateayuda-app-1 ls -la /app/public/ 2>&1 || true
