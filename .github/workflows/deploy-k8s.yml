name: Deploy k8s apps

# Requiere bootstrap-k3s. Despliega VTA + Hoy (+ Terremoto images) en k3s host.
# Público sigue en Compose/HAProxy. Preview: NodePort 30080 con Host header.
on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps a desplegar"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - vta
          - hoy
          - terremoto

concurrency:
  group: deploy-k8s
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vta]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Host kubectl helper
        run: |
          set -euo pipefail
          cat > /tmp/hk <<'EOS'
          #!/bin/sh
          docker run --rm --privileged --pid=host --net=host alpine:3.20 \
            nsenter --target 1 --mount --uts --ipc --net -- sh -c "$*"
          EOS
          chmod +x /tmp/hk
          /tmp/hk 'k3s kubectl get nodes -o wide'
          /tmp/hk 'k3s kubectl -n ingress-nginx get svc'

      - name: Ensure production env file
        if: ${{ inputs.apps == 'all' || inputs.apps == 'vta' }}
        env:
          POSTGRES_PASSWORD: ${{ secrets.VTA_POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.VTA_AUTH_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.VTA_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.VTA_ADMIN_EMAIL }}
          EMAIL_FROM: ${{ secrets.VTA_EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.VTA_RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.VTA_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.VTA_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.VTA_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.VTA_SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.VTA_SMTP_FROM }}
        run: |
          set -euo pipefail
          export ADMIN_EMAIL="${ADMIN_EMAIL:-admin@mallanet.org}"
          export EMAIL_FROM="${EMAIL_FROM:-no-reply@mallanet.org}"
          chmod +x scripts/vps-write-env.sh
          bash scripts/vps-write-env.sh

      - name: Build/import VTA image + apply
        if: ${{ inputs.apps == 'all' || inputs.apps == 'vta' }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source scripts/lib/env-prod.sh
          ENV_FILE=/opt/venezuelateayuda/.env.prod
          PG_PASS="$(env_prod_read "$ENV_FILE" POSTGRES_PASSWORD)"
          AUTH_SECRET="$(env_prod_read "$ENV_FILE" AUTH_SECRET)"
          ADMIN_EMAIL="$(env_prod_read "$ENV_FILE" ADMIN_EMAIL)"
          ADMIN_PASSWORD="$(env_prod_read "$ENV_FILE" ADMIN_PASSWORD)"
          EMAIL_FROM="$(env_prod_read "$ENV_FILE" EMAIL_FROM)"
          RESEND_API_KEY="$(env_prod_read "$ENV_FILE" RESEND_API_KEY)"
          SMTP_HOST="$(env_prod_read "$ENV_FILE" SMTP_HOST)"
          SMTP_PORT="$(env_prod_read "$ENV_FILE" SMTP_PORT)"
          SMTP_USERNAME="$(env_prod_read "$ENV_FILE" SMTP_USERNAME)"
          SMTP_PASSWORD="$(env_prod_read "$ENV_FILE" SMTP_PASSWORD)"
          SMTP_FROM="$(env_prod_read "$ENV_FILE" SMTP_FROM)"
          DB_IP="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' venezuelateayuda-db-1 | awk '{print $1}')"
          test -n "$DB_IP"
          DATABASE_URL="postgresql://vta:${PG_PASS}@${DB_IP}:5432/venezuelateayuda?schema=public"

          docker compose -f docker-compose.prod.yml --env-file "$ENV_FILE" build app
          docker tag venezuelateayuda-app:latest venezuelateayuda:k8s
          docker save venezuelateayuda:k8s | /tmp/hk 'k3s ctr images import -'

          /tmp/hk 'k3s kubectl create ns venezuelateayuda --dry-run=client -o yaml | k3s kubectl apply -f -'

          # Secret via kubectl from runner (docker exec into a kubectl container with kubeconfig from host)
          docker run --rm --privileged --pid=host --net=host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e PG_PASS="$PG_PASS" \
            -e AUTH_SECRET="$AUTH_SECRET" \
            -e ADMIN_EMAIL="$ADMIN_EMAIL" \
            -e ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            -e EMAIL_FROM="$EMAIL_FROM" \
            -e RESEND_API_KEY="$RESEND_API_KEY" \
            -e SMTP_HOST="$SMTP_HOST" \
            -e SMTP_PORT="${SMTP_PORT:-465}" \
            -e SMTP_USERNAME="$SMTP_USERNAME" \
            -e SMTP_PASSWORD="$SMTP_PASSWORD" \
            -e SMTP_FROM="$SMTP_FROM" \
            alpine:3.20 nsenter --target 1 --mount --uts --ipc --net -- sh -c '
              k3s kubectl -n venezuelateayuda create secret generic vta-env \
                --from-literal=DATABASE_URL="$DATABASE_URL" \
                --from-literal=DATABASE_URL_UNPOOLED="$DATABASE_URL" \
                --from-literal=POSTGRES_PASSWORD="$PG_PASS" \
                --from-literal=AUTH_SECRET="$AUTH_SECRET" \
                --from-literal=AUTH_URL=https://venezuelateayuda.org \
                --from-literal=NEXT_PUBLIC_APP_URL=https://venezuelateayuda.org \
                --from-literal=EMAIL_FROM="$EMAIL_FROM" \
                --from-literal=RESEND_API_KEY="$RESEND_API_KEY" \
                --from-literal=SMTP_HOST="$SMTP_HOST" \
                --from-literal=SMTP_PORT="$SMTP_PORT" \
                --from-literal=SMTP_USERNAME="$SMTP_USERNAME" \
                --from-literal=SMTP_PASSWORD="$SMTP_PASSWORD" \
                --from-literal=SMTP_FROM="$SMTP_FROM" \
                --from-literal=ADMIN_EMAIL="$ADMIN_EMAIL" \
                --from-literal=ADMIN_PASSWORD="$ADMIN_PASSWORD" \
                --from-literal=UPLOADS_DIR=/data/uploads \
                --dry-run=client -o yaml | k3s kubectl apply -f -
            '

          cat > /tmp/vta.yaml <<'YAML'
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: vta-uploads
            namespace: venezuelateayuda
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: app
            namespace: venezuelateayuda
            labels:
              app: venezuelateayuda
              tier: web
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: venezuelateayuda
                tier: web
            template:
              metadata:
                labels:
                  app: venezuelateayuda
                  tier: web
              spec:
                hostNetwork: true
                dnsPolicy: ClusterFirstWithHostNet
                containers:
                  - name: app
                    image: docker.io/library/venezuelateayuda:k8s
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 3000
                        hostPort: 3000
                    envFrom:
                      - secretRef:
                          name: vta-env
                    env:
                      - name: PORT
                        value: "3000"
                      - name: HOSTNAME
                        value: "0.0.0.0"
                      - name: UPLOADS_DIR
                        value: /data/uploads
                    volumeMounts:
                      - name: uploads
                        mountPath: /data/uploads
                    readinessProbe:
                      httpGet:
                        path: /api/health
                        port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                volumes:
                  - name: uploads
                    persistentVolumeClaim:
                      claimName: vta-uploads
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: app
            namespace: venezuelateayuda
          spec:
            selector:
              app: venezuelateayuda
              tier: web
            ports:
              - port: 80
                targetPort: 3000
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: venezuelateayuda
            namespace: venezuelateayuda
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "4m"
          spec:
            ingressClassName: nginx
            rules:
              - host: k8s.venezuelateayuda.org
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: app
                          port:
                            number: 80
          YAML
          # hostPort 3000 conflicts with compose app — use 3010 for k8s preview
          sed -i 's/hostPort: 3000/hostPort: 3010/' /tmp/vta.yaml
          sed -i 's/containerPort: 3000/containerPort: 3010/' /tmp/vta.yaml
          sed -i 's/value: "3000"/value: "3010"/' /tmp/vta.yaml
          sed -i 's/port: 3000/port: 3010/' /tmp/vta.yaml
          sed -i 's/targetPort: 3000/targetPort: 3010/' /tmp/vta.yaml

          B64=$(base64 -w0 /tmp/vta.yaml)
          /tmp/hk "echo $B64 | base64 -d > /tmp/vta.yaml && k3s kubectl apply -f /tmp/vta.yaml"
          /tmp/hk 'k3s kubectl -n venezuelateayuda rollout status deploy/app --timeout=240s || (k3s kubectl -n venezuelateayuda get pods -o wide; k3s kubectl -n venezuelateayuda describe pod -l tier=web | tail -50; exit 1)'

      - name: Build/import Venezuela Hoy + apply
        if: ${{ inputs.apps == 'all' || inputs.apps == 'hoy' }}
        env:
          GH_TOKEN: ${{ secrets.MALLADOG_REPO_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf /tmp/venezuelahoy
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/mallanet/venezuelahoy.git" /tmp/venezuelahoy
          docker build -t venezuelahoy:k8s /tmp/venezuelahoy
          docker save venezuelahoy:k8s | /tmp/hk 'k3s ctr images import -'

          cat > /tmp/hoy.yaml <<'YAML'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: venezuelahoy
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: web
            namespace: venezuelahoy
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: venezuelahoy
                tier: web
            template:
              metadata:
                labels:
                  app: venezuelahoy
                  tier: web
              spec:
                containers:
                  - name: nginx
                    image: docker.io/library/venezuelahoy:k8s
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 80
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: web
            namespace: venezuelahoy
          spec:
            selector:
              app: venezuelahoy
              tier: web
            ports:
              - port: 80
                targetPort: 80
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: venezuelahoy
            namespace: venezuelahoy
          spec:
            ingressClassName: nginx
            rules:
              - host: hoy.k8s.mallanet.org
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: web
                          port:
                            number: 80
          YAML
          B64=$(base64 -w0 /tmp/hoy.yaml)
          /tmp/hk "echo $B64 | base64 -d > /tmp/hoy.yaml && k3s kubectl apply -f /tmp/hoy.yaml"
          /tmp/hk 'k3s kubectl -n venezuelahoy rollout status deploy/web --timeout=180s'

      - name: Import Terremoto images into k3s
        if: ${{ inputs.apps == 'all' || inputs.apps == 'terremoto' }}
        run: |
          set -euo pipefail
          /tmp/hk 'k3s kubectl create ns mapa --dry-run=client -o yaml | k3s kubectl apply -f -'
          for img in terremotoapp-frontend terremotoapp-backend terremotoapp-admin terremotoapp-worker; do
            if docker image inspect "$img:latest" >/dev/null 2>&1; then
              docker tag "$img:latest" "${img}:k8s"
              docker save "${img}:k8s" | /tmp/hk 'k3s ctr images import -'
              echo "imported $img"
            else
              echo "missing $img — skip"
            fi
          done
          /tmp/hk 'k3s ctr images ls | grep -E "venezuelateayuda|venezuelahoy|terremotoapp" || true'

      - name: Smoke NodePort previews
        run: |
          set -euo pipefail
          echo "== pods =="
          /tmp/hk 'k3s kubectl get pods -A'
          echo "== ingress =="
          /tmp/hk 'k3s kubectl get ingress -A'
          echo "== smoke hoy =="
          curl -sI -H 'Host: hoy.k8s.mallanet.org' http://127.0.0.1:30080/ | head -8 || true
          echo "== smoke vta k8s =="
          curl -sI -H 'Host: k8s.venezuelateayuda.org' http://127.0.0.1:30080/ | head -8 || true
          curl -sI http://127.0.0.1:3010/api/health | head -8 || true
          echo "Public sites still on Compose HAProxy :80/:443"
          curl -sI https://venezuelateayuda.org/api/health | head -5
          curl -sI https://terremotovenezuela.app | head -5
