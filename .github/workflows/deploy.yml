name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Run prisma seed (first deploy only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, vta]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write production env
        run: |
          if [[ -f /opt/venezuelateayuda/.env.prod ]]; then
            cp /opt/venezuelateayuda/.env.prod .env.prod
          else
            cat > .env.prod <<EOF
          POSTGRES_PASSWORD=${{ secrets.VTA_POSTGRES_PASSWORD }}
          AUTH_SECRET=${{ secrets.VTA_AUTH_SECRET }}
          AUTH_URL=https://venezuelateayuda.org
          NEXT_PUBLIC_APP_URL=https://venezuelateayuda.org
          EMAIL_FROM=${EMAIL_FROM:-no-reply@venezuelateayuda.org}
          ADMIN_EMAIL=${ADMIN_EMAIL:-admin@venezuelateayuda.org}
          ADMIN_PASSWORD=${{ secrets.VTA_ADMIN_PASSWORD }}
          EOF
          fi
        env:
          EMAIL_FROM: ${{ secrets.VTA_EMAIL_FROM }}
          ADMIN_EMAIL: ${{ secrets.VTA_ADMIN_EMAIL }}

      - name: Fix Terremoto Caddy (502 guard)
        run: |
          chmod +x scripts/vps-fix-terremoto.sh scripts/vps-bootstrap.sh
          bash scripts/vps-fix-terremoto.sh || true

      - name: Deploy to VPS
        env:
          RUN_SEED: ${{ github.event.inputs.run_seed || 'false' }}
        run: |
          chmod +x scripts/vps-deploy.sh scripts/vps-bootstrap.sh scripts/vps-fix-terremoto.sh scripts/vps-rebuild-caddy.sh
          bash scripts/vps-deploy.sh
