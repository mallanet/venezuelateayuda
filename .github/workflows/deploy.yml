name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Run prisma seed (first deploy only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, vta]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write canonical production env
        env:
          POSTGRES_PASSWORD: ${{ secrets.VTA_POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.VTA_AUTH_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.VTA_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.VTA_ADMIN_EMAIL }}
          EMAIL_FROM: ${{ secrets.VTA_EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.VTA_RESEND_API_KEY }}
          SMTP_HOST: ${{ secrets.VTA_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.VTA_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.VTA_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.VTA_SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.VTA_SMTP_FROM }}
        run: |
          export ADMIN_EMAIL="${ADMIN_EMAIL:-admin@mallanet.org}"
          export EMAIL_FROM="${EMAIL_FROM:-no-reply@mallanet.org}"
          export RESEND_API_KEY="${RESEND_API_KEY:-}"
          export SMTP_HOST="${SMTP_HOST:-}"
          export SMTP_PORT="${SMTP_PORT:-465}"
          export SMTP_USERNAME="${SMTP_USERNAME:-}"
          export SMTP_PASSWORD="${SMTP_PASSWORD:-}"
          export SMTP_FROM="${SMTP_FROM:-}"
          chmod +x scripts/vps-write-env.sh
          bash scripts/vps-write-env.sh

      - name: Sync DB password and deploy
        env:
          RUN_SEED: ${{ github.event.inputs.run_seed || 'false' }}
        run: |
          chmod +x scripts/vps-sync-db-password.sh scripts/vps-deploy.sh scripts/vps-setup-edge.sh
          bash scripts/vps-sync-db-password.sh
          bash scripts/vps-deploy.sh

      - name: Verify public API
        run: |
          for i in $(seq 1 24); do
            if curl -sf https://venezuelateayuda.org/api/health | grep -q '"ok":true'; then
              curl -sf https://venezuelateayuda.org/api/listings | grep -q '"listings"'
              exit 0
            fi
            echo "waiting for TLS + app ($i/24)..."
            sleep 10
          done
          echo "::error::health check timed out after 4 minutes"
          exit 1
