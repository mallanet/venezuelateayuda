name: Ops — Fix DB

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted, vta]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Write canonical production env
        env:
          POSTGRES_PASSWORD: ${{ secrets.VTA_POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.VTA_AUTH_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.VTA_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.VTA_ADMIN_EMAIL }}
          EMAIL_FROM: ${{ secrets.VTA_EMAIL_FROM }}
        run: |
          export ADMIN_EMAIL="${ADMIN_EMAIL:-admin@venezuelateayuda.org}"
          export EMAIL_FROM="${EMAIL_FROM:-no-reply@mallanet.org}"
          chmod +x scripts/vps-write-env.sh scripts/vps-sync-db-password.sh
          bash scripts/vps-write-env.sh
          bash scripts/vps-sync-db-password.sh
      - name: Diagnose
        run: |
          chmod +x scripts/vps-diagnose.sh
          bash scripts/vps-diagnose.sh
      - name: Verify public API
        run: |
          curl -sf https://venezuelateayuda.org/api/health | grep -q '"ok":true'
          curl -sf https://venezuelateayuda.org/api/listings | grep -q '"listings"'
