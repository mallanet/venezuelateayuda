name: Ops — Fix Terremoto

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/vps-fix-terremoto.sh
      - .github/workflows/fix-terremoto.yml

jobs:
  fix:
    runs-on: [self-hosted, vta]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: |
          chmod +x scripts/vps-fix-terremoto.sh scripts/vps-bootstrap.sh scripts/vps-rebuild-caddy.sh
          bash scripts/vps-fix-terremoto.sh
