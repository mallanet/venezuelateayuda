apiVersion: batch/v1
kind: Job
metadata:
  name: vta-migrate
  namespace: venezuelateayuda
  labels:
    app: venezuelateayuda
    tier: migrate
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: venezuelateayuda
        tier: migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: migrate
          image: ghcr.io/mallanet/venezuelateayuda:migrate-latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: vta-env
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
