apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vta-uploads
  namespace: venezuelateayuda
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: venezuelateayuda
  labels:
    app: venezuelateayuda
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: venezuelateayuda
      tier: web
  template:
    metadata:
      labels:
        app: venezuelateayuda
        tier: web
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: app
          image: docker.io/library/venezuelateayuda:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 3010
          envFrom:
            - secretRef:
                name: vta-env
          env:
            - name: PORT
              value: "3010"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: UPLOADS_DIR
              value: /data/uploads
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: vta-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: venezuelateayuda
spec:
  selector:
    app: venezuelateayuda
    tier: web
  ports:
    - port: 80
      targetPort: 3010
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: venezuelateayuda
  namespace: venezuelateayuda
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  rules:
    - host: k8s.venezuelateayuda.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 80
