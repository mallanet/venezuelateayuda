apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vta-postgres
  namespace: venezuelateayuda
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: venezuelateayuda
  labels:
    app: venezuelateayuda
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: venezuelateayuda
      tier: db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: venezuelateayuda
        tier: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: vta
            - name: POSTGRES_DB
              value: venezuelateayuda
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vta-env
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "vta", "-d", "venezuelateayuda"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vta-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: venezuelateayuda
spec:
  selector:
    app: venezuelateayuda
    tier: db
  ports:
    - port: 5432
      targetPort: 5432
