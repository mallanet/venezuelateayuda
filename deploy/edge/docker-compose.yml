name: vps-edge

services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: vps-edge-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - vps_edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  vps_edge:
    name: vps_edge
    external: true
