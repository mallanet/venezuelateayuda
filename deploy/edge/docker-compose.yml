name: vps-edge

services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: vps-edge-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - vps_edge

networks:
  vps_edge:
    name: vps_edge
    external: true
