name: venezuelateayuda

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "hba_file=/etc/pg_hba.conf"]
    env_file:
      - ${ENV_FILE:-.env.prod}
    environment:
      POSTGRES_USER: vta
      POSTGRES_DB: venezuelateayuda
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/pg_hba.conf:/etc/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vta -d venezuelateayuda"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - edge

  seed:
    build:
      context: .
      target: migrate
    profiles: ["seed"]
    command: ["npx", "tsx", "prisma/seed.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: "no"

  caddy:
    profiles: ["standalone"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.standalone:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - edge

networks:
  internal:
  edge:
    name: terremotoapp_mapa_prod_net
    external: true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
