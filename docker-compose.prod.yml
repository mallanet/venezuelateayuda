name: venezuelateayuda

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    environment:
      POSTGRES_USER: vta
      POSTGRES_DB: venezuelateayuda
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vta -d venezuelateayuda"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: venezuelateayuda-caddy-1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal
      - edge

  seed:
    build:
      context: .
      target: migrate
    profiles: ["seed"]
    command: ["npx", "tsx", "prisma/seed.ts"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: "no"

networks:
  internal:
    name: vta_internal
  edge:
    name: vps_edge
    external: true

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
